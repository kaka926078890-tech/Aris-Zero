<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Aris</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: 'Noto Sans SC', ui-sans-serif, system-ui, sans-serif; }
    #canvas-container { width: 100%; min-height: 0; }
    .drag-region { -webkit-app-region: drag; }
    .no-drag { -webkit-app-region: no-drag; }
    /* 对话层：更透一些、弱模糊，聚焦输入时背后 HUD 仍能看清 */
    #dialogue-overlay { background: linear-gradient(180deg, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.55) 100%); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
    #bubbles-wrap::-webkit-scrollbar { display: none; }
    #bubbles-wrap { overflow-y: auto; -webkit-overflow-scrolling: touch; max-height: calc(100vh - 7rem); }
    #bubbles { width: 100%; }
    .bubble-scroll-inner::-webkit-scrollbar { display: none; }
    .bubble-scroll-inner { scrollbar-width: none; -ms-overflow-style: none; }
    .bubble-content { white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; line-height: 1.55; overflow-x: hidden; max-width: 100%; -webkit-user-select: text; user-select: text; cursor: text; letter-spacing: 0.01em; }
    .bubble-row { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; max-width: 85%; min-width: 0; }
    .bubble-row.user-msg { align-self: flex-end; align-items: flex-end; }
    .bubble-row.assistant-msg { align-self: flex-start; }
    .bubble-copy { flex-shrink: 0; padding: 6px 8px; color: rgba(34, 211, 238, 0.75); background: transparent; border: none; border-radius: 8px; cursor: pointer; -webkit-app-region: no-drag; opacity: 0; transition: opacity 0.2s ease, color 0.2s ease, background 0.2s ease; font-size: 0.75rem; }
    .bubble-row:hover .bubble-copy { opacity: 1; }
    .bubble-copy:hover { color: rgba(34, 211, 238, 1); background: rgba(6, 182, 212, 0.12); }
    .bubble-content .tool-call-tag { display: inline-block; margin: 2px 0; padding: 3px 10px; border-radius: 8px; background: rgba(6, 182, 212, 0.15); color: rgba(34, 211, 238, 0.95); font-size: 0.75rem; }
    .bubble-content .code-block { display: block; margin: 6px 0; padding: 8px 10px; border-radius: 8px; background: rgba(0,0,0,0.4); font-family: ui-monospace, monospace; font-size: 0.8em; overflow-x: auto; white-space: pre-wrap; border: 1px solid rgba(34, 211, 238, 0.1); }
    .bubble-self-expression { white-space: pre-wrap; word-break: break-word; line-height: 1.45; }
    .bubble-loading-dots { display: inline-flex; gap: 3px; align-items: center; }
    .bubble-loading-dots span { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.5; animation: bubble-dot 0.6s ease-in-out infinite both; }
    .bubble-loading-dots span:nth-child(2) { animation-delay: 0.1s; }
    .bubble-loading-dots span:nth-child(3) { animation-delay: 0.2s; }
    @keyframes bubble-dot { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
    .input-area { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(34, 211, 238, 0.25); border-radius: 12px; transition: border-color 0.2s ease, box-shadow 0.2s ease; flex-wrap: nowrap; }
    .input-area:focus-within { border-color: rgba(34, 211, 238, 0.5); box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15); }
    #dialogue-input::placeholder { color: rgba(148, 163, 184, 0.8); }
    .btn-stop { min-width: 72px; height: 40px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; gap: 5px; border: 1px solid rgba(248, 113, 113, 0.5); border-radius: 10px; cursor: pointer; color: rgb(248, 113, 113); background: rgba(248, 113, 113, 0.15); font-size: 13px; font-weight: 500; transition: background 0.2s ease, border-color 0.2s ease; -webkit-app-region: no-drag; }
    .btn-stop:hover { background: rgba(248, 113, 113, 0.28); border-color: rgba(248, 113, 113, 0.8); color: rgb(254, 202, 202); }
    .btn-stop:focus { outline: none; box-shadow: 0 0 0 2px rgba(248, 113, 113, 0.4); }
    .btn-stop.is-hidden { visibility: hidden; pointer-events: none; background: transparent; border-color: transparent; color: transparent; min-width: 72px; }
  </style>
</head>
<body class="flex flex-col h-full">
  <div id="drag-bar" class="h-9 flex-shrink-0 flex overflow-hidden min-w-0" style="-webkit-app-region: drag">
    <div class="w-[70px] flex-shrink-0 no-drag" style="-webkit-app-region: no-drag"></div>
    <div class="flex-1 min-w-0 overflow-hidden" style="-webkit-app-region: drag"></div>
  </div>
  <div id="canvas-container" class="flex-1 no-drag"></div>
  <!-- 对话层从 top-9 开始，不覆盖标题栏/关闭最小化按钮；对话区域可纵向滚动 -->
  <div id="dialogue-overlay" class="hidden fixed top-9 left-0 right-0 bottom-0 flex flex-col items-center justify-end pb-6 pointer-events-none">
    <div id="bubbles-wrap" class="w-full max-w-sm flex-1 min-h-0 overflow-y-auto overflow-x-hidden pointer-events-auto flex flex-col px-3 pt-4 overscroll-behavior-contain" style="scrollbar-width: none; -ms-overflow-style: none;">
      <div id="bubbles-spacer" class="min-h-0 flex-1"></div>
      <div id="bubbles" class="flex flex-col gap-3 flex-shrink-0"></div>
    </div>
    <div class="w-full max-w-sm px-3 pt-3 pb-1 flex-shrink-0 pointer-events-auto no-drag flex flex-col gap-2">
      <div class="input-area flex gap-2 items-end p-2">
        <textarea id="dialogue-input" rows="1" placeholder="输入消息，Shift+Enter 换行…" class="flex-1 min-h-[44px] max-h-[120px] bg-transparent text-cyan-100 placeholder-slate-400 px-2 py-2.5 text-sm focus:outline-none resize-none overflow-y-auto"></textarea>
        <button type="button" id="dialogue-stop" class="btn-stop is-hidden" title="停止生成" aria-label="停止生成">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          <span>停止</span>
        </button>
      </div>
    </div>
  </div>
  <script src="./dist/bundle.js"></script>
</body>
</html>
