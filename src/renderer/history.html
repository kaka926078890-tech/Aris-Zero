<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.tailwindcss.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>历史记录 - Aris</title>
  <style>
    .no-drag { -webkit-app-region: no-drag; }
    .message-bubble { scroll-margin-top: 4rem; }
    .message-bubble.search-hit { background: rgba(6, 182, 212, 0.15); }
  </style>
</head>
<body class="bg-slate-900 text-slate-200 flex flex-col h-screen overflow-hidden">
  <header class="flex-shrink-0 flex items-center gap-2 border-b border-cyan-500/30 px-4 py-2 no-drag overflow-hidden min-w-0">
    <h1 class="text-lg font-medium text-cyan-200 flex-shrink-0">历史记录</h1>
    <div class="flex-1 flex items-center gap-2 min-w-0 overflow-hidden">
      <input id="searchInput" type="text" placeholder="检索…" class="flex-1 min-w-0 max-w-xs bg-black/40 text-cyan-100 border border-cyan-500/40 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-cyan-400" />
      <button id="searchBtn" class="text-xs px-3 py-1.5 rounded border border-cyan-500/50 text-cyan-300 hover:bg-cyan-500/20 flex-shrink-0">检索</button>
    </div>
    <button id="refreshHistory" class="text-xs px-3 py-1.5 rounded border border-cyan-500/50 text-cyan-300 hover:bg-cyan-500/20 flex-shrink-0">刷新</button>
    <button id="clearHistory" class="text-xs px-3 py-1.5 rounded border border-red-500/40 text-red-300 hover:bg-red-500/10 flex-shrink-0">删除历史记录</button>
  </header>
  <main id="messagesWrap" class="flex-1 min-h-0 overflow-y-auto px-4 py-3">
    <div id="messages" class="max-w-xl mx-auto space-y-3"></div>
    <p id="empty" class="text-sm text-slate-500 hidden">暂无历史会话</p>
  </main>
  <script>
    const messagesWrap = document.getElementById('messagesWrap');
    const messagesEl = document.getElementById('messages');
    const emptyEl = document.getElementById('empty');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts * 1000);
      const now = new Date();
      if (d.toDateString() === now.toDateString()) {
        return '今天 ' + d.toTimeString().slice(0, 5);
      }
      return d.toLocaleDateString('zh-CN') + ' ' + d.toTimeString().slice(0, 5);
    }

    function stripEmotionBlock(text) {
      if (typeof text !== 'string') return '';
      let s = text.replace(/【情感摘要】[\s\S]*?强度评分[：:]\s*\d[^\n]*/g, '');
      s = s.replace(/\n*【情感摘要】[\s\S]*$/g, '');
      return s.replace(/\n{3,}/g, '\n\n').trim();
    }

    function renderMessages(list) {
      messagesEl.innerHTML = '';
      if (!list || list.length === 0) {
        emptyEl.classList.remove('hidden');
        return;
      }
      emptyEl.classList.add('hidden');
      list.forEach(({ role, content, created_at }) => {
        const div = document.createElement('div');
        div.className = 'message-bubble';
        div.dataset.content = content;
        const row = document.createElement('div');
        row.className = role === 'user' ? 'text-right' : 'text-left';
        const bubble = document.createElement('div');
        bubble.className = role === 'user'
          ? 'inline-block max-w-[85%] rounded-lg px-3 py-1.5 text-sm bg-cyan-500/20 text-cyan-100'
          : 'inline-block max-w-[85%] rounded-lg px-3 py-1.5 text-sm bg-slate-700/50 text-slate-200';
        bubble.textContent = role === 'assistant' ? stripEmotionBlock(content) : content;
        row.appendChild(bubble);
        const time = document.createElement('div');
        time.className = 'text-xs text-slate-500 mt-0.5';
        time.textContent = formatTime(created_at);
        row.appendChild(time);
        div.appendChild(row);
        messagesEl.appendChild(div);
      });
      // 等布局完成后再滚动到底部，避免 scrollHeight 未更新
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          scrollToLatest();
        });
      });
    }

    function scrollToLatest() {
      if (messagesWrap) messagesWrap.scrollTop = messagesWrap.scrollHeight;
    }

    function doSearch() {
      const q = (searchInput.value || '').trim();
      const bubbles = messagesEl.querySelectorAll('.message-bubble');
      bubbles.forEach((el) => el.classList.remove('search-hit'));
      if (!q) {
        scrollToLatest();
        return;
      }
      const lower = q.toLowerCase();
      const hits = [];
      bubbles.forEach((el) => {
        const text = (el.dataset.content || '').toLowerCase();
        if (text.includes(lower)) {
          el.classList.add('search-hit');
          hits.push(el);
        }
      });
      if (hits.length > 0) {
        hits[hits.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    async function loadHistory() {
      const sessionId = await window.historyApi.getCurrentSessionId();
      const list = await window.historyApi.getConversation(sessionId);
      renderMessages(list);
    }

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

    document.getElementById('refreshHistory').addEventListener('click', () => loadHistory());

    document.getElementById('clearHistory').addEventListener('click', async () => {
      if (!confirm('确定要删除全部历史记录吗？此操作不可恢复。')) return;
      if (typeof window.historyApi !== 'undefined' && window.historyApi.clearAll) {
        await window.historyApi.clearAll();
        loadHistory();
      }
    });

    loadHistory();
  </script>
</body>
</html>
